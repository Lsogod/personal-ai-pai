    <text x="480" y="190" text-anchor="middle" fill="#059669" font-size="15" font-weight="800">🔀 Router · 意图路由器</text>
    <text x="480" y="210" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">router_node() 意图分类  →  route_intent() 条件路由</text>
    <text x="480" y="228" text-anchor="middle" fill="#64748B" font-size="10">上下文增强: conversation_context · has_image · has_pending_ledger · tool_catalog</text>
  </g>
  <circle cx="480" cy="190" r="3" fill="#34D399" class="pulse-node"/>

  <g class="hover-card" filter="url(#softShadow)">
    <rect x="736" y="74" width="214" height="170" rx="12" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1.5" />
    <text x="785" y="94" fill="#059669" font-size="11" font-weight="800">🧠 路由分层决策</text>
    <line x1="746" y1="102" x2="940" y2="102" stroke="#CBD5E1" stroke-width="1"/>
    <text x="746" y="116" fill="#B45309" font-size="9.5" font-weight="700">① 前置拦截 (router_node)</text>
    <text x="756" y="128" fill="#64748B" font-size="9">setup_stage &lt; 3 → 跳过(由③处理)</text>
    <text x="756" y="140" fill="#64748B" font-size="9">空消息且无图 → chat_manager</text>
    <text x="746" y="156" fill="#B45309" font-size="9.5" font-weight="700">② LLM 意图分类</text>
    <text x="756" y="168" fill="#64748B" font-size="9">_classify_intent_with_llm()</text>
    <text x="756" y="180" fill="#64748B" font-size="9">+context · +image · +pending</text>
    <text x="756" y="192" fill="#64748B" font-size="9">unknown → image/pending→ledger_mgr</text>
    <text x="746" y="208" fill="#B45309" font-size="9.5" font-weight="700">③ 命令兜底 (route_intent)</text>
    <text x="756" y="220" fill="#64748B" font-size="9">setup&lt;3→onboarding</text>
    <text x="756" y="232" fill="#64748B" font-size="9">/help /skill /ledger ...</text>
  </g>

  <line x1="680" y1="168" x2="736" y2="168" class="flow-line" stroke="#86EFAC" stroke-width="2" marker-end="url(#arrow-green)"/>

  <text x="480" y="266" text-anchor="middle" fill="#64748B" font-size="10" font-weight="600">add_conditional_edges("router", route_intent)</text>

  <g stroke="#CBD5E1" stroke-width="2" class="flow-line" opacity="0.6">
    <path d="M 320 246 L 85 310" marker-end="url(#arrow)" style="animation-delay:.1s"/>    <!-- -> Onboarding -->
    <path d="M 380 246 L 232 310" marker-end="url(#arrow)" style="animation-delay:.2s"/>   <!-- -> Ledger -->
    <path d="M 440 246 L 381 310" marker-end="url(#arrow)" style="animation-delay:.3s"/>   <!-- -> Schedule -->
    <path d="M 500 246 L 530 310" marker-end="url(#arrow)" style="animation-delay:.4s"/>   <!-- -> Chat -->
    <path d="M 560 246 L 681 310" marker-end="url(#arrow)" style="animation-delay:.5s"/>   <!-- -> Skill -->
    <path d="M 640 246 L 850 310" marker-end="url(#arrow)" style="animation-delay:.6s"/>   <!-- -> Help Center -->
    <path d="M 600 246 L 842 456" marker-end="url(#arrow)" style="animation-delay:.7s"/>   <!-- -> Complex Task -->
