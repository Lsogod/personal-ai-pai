<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 980" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1324" />
      <stop offset="100%" stop-color="#101c33" />
    </linearGradient>
    <style>
      .title { fill: #edf3ff; font-size: 30px; font-weight: 700; }
      .subtitle { fill: #a2b4d2; font-size: 14px; }
      .section { fill: #d6e5ff; font-size: 16px; font-weight: 700; }
      .stepTitle { fill: #f8fbff; font-size: 14px; font-weight: 700; }
      .stepText { fill: #bfd0ea; font-size: 12px; }
      .note { fill: #8ea5cc; font-size: 11px; }
      .line { stroke: #79a0de; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke: #79a0de; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#8fb1e8" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="980" fill="url(#bg)" />
  <text x="600" y="48" text-anchor="middle" class="title">PAI Agent Workflow</text>
  <text x="600" y="72" text-anchor="middle" class="subtitle">Actual execution path in current codebase</text>

  <rect x="40" y="100" width="1120" height="840" rx="16" fill="#111f39" stroke="#2b4372" />

  <text x="64" y="132" class="section">Request Lifecycle</text>

  <rect x="80" y="156" width="460" height="84" rx="12" fill="#1d3356" stroke="#4b73b8" />
  <text x="100" y="184" class="stepTitle">1) Receive message</text>
  <text x="100" y="202" class="stepText">UnifiedMessage normalization + dedup + user/conversation load</text>
  <text x="100" y="220" class="stepText">store user message + emit websocket event for non-web channels</text>

  <rect x="80" y="266" width="460" height="84" rx="12" fill="#1d3356" stroke="#4b73b8" />
  <text x="100" y="294" class="stepTitle">2) Pre-graph checks</text>
  <text x="100" y="312" class="stepText">rebind-intent guard, command handling, quota/block checks</text>
  <text x="100" y="330" class="stepText">if command matched then return command result directly</text>

  <rect x="80" y="376" width="460" height="112" rx="12" fill="#234063" stroke="#5f8fca" />
  <text x="100" y="404" class="stepTitle">3) Long-term memory retrieval mode switch</text>
  <text x="100" y="422" class="stepText">A. List-query intent: detect via regex, wait brief settle window,</text>
  <text x="100" y="440" class="stepText">   call list_long_term_memories() and answer directly</text>
  <text x="100" y="458" class="stepText">B. Normal query: call retrieve_relevant_long_term_memories(top-k)</text>
  <text x="100" y="476" class="stepText">   and put result into state.extra.long_term_memories</text>

  <rect x="80" y="514" width="460" height="112" rx="12" fill="#1f355a" stroke="#537fc5" />
  <text x="100" y="542" class="stepTitle">4) Graph execution (normal mode)</text>
  <text x="100" y="560" class="stepText">router_node classifies intent by LLM structured output</text>
  <text x="100" y="578" class="stepText">route_intent dispatches to onboarding/ledger/schedule/chat/skill/help/complex</text>
  <text x="100" y="596" class="stepText">node runs domain logic and tool calls, returns response list</text>
  <text x="100" y="614" class="stepText">message_handler sends responses and stores assistant messages</text>

  <rect x="80" y="652" width="460" height="112" rx="12" fill="#2a2f4f" stroke="#7a7fc2" />
  <text x="100" y="680" class="stepTitle">5) Async memory write pipeline (post-response)</text>
  <text x="100" y="698" class="stepText">extract_memory_candidates(user_text, assistant_text, summary)</text>
  <text x="100" y="716" class="stepText">upsert_long_term_memories with dedupe/confidence/filter checks</text>
  <text x="100" y="734" class="stepText">runs in background task for lower user-facing latency</text>
  <text x="100" y="752" class="stepText">next memory-list query can optionally wait for this pipeline briefly</text>

  <path d="M310 240 V266" class="line" />
  <path d="M310 350 V376" class="line" />
  <path d="M310 488 V514" class="line" />
  <path d="M310 626 V652" class="line" />

  <text x="620" y="132" class="section">Router and Node Execution</text>

  <rect x="600" y="156" width="520" height="94" rx="12" fill="#1d3557" stroke="#4d78be" />
  <text x="620" y="184" class="stepTitle">router_node</text>
  <text x="620" y="202" class="stepText">inputs: user message, context summary, runtime tool catalog, pending ledger flag</text>
  <text x="620" y="220" class="stepText">outputs: intent + use_complex + optional tool_catalog in state.extra</text>
  <text x="620" y="238" class="stepText">fallback: command intent mapper when LLM intent is unknown</text>

  <rect x="600" y="276" width="160" height="84" rx="12" fill="#1f355a" stroke="#5b8fd2" />
  <text x="680" y="304" text-anchor="middle" class="stepTitle">ledger_manager</text>
  <text x="680" y="322" text-anchor="middle" class="note">ledger CRUD</text>
  <text x="680" y="338" text-anchor="middle" class="note">corrections</text>

  <rect x="776" y="276" width="160" height="84" rx="12" fill="#1f355a" stroke="#5b8fd2" />
  <text x="856" y="304" text-anchor="middle" class="stepTitle">schedule_manager</text>
  <text x="856" y="322" text-anchor="middle" class="note">reminder/calendar</text>
  <text x="856" y="338" text-anchor="middle" class="note">weather conditional</text>

  <rect x="952" y="276" width="160" height="84" rx="12" fill="#1f355a" stroke="#5b8fd2" />
  <text x="1032" y="304" text-anchor="middle" class="stepTitle">chat_manager</text>
  <text x="1032" y="322" text-anchor="middle" class="note">general chat</text>
  <text x="1032" y="338" text-anchor="middle" class="note">tool-grounded replies</text>

  <rect x="600" y="380" width="160" height="84" rx="12" fill="#1f355a" stroke="#5b8fd2" />
  <text x="680" y="408" text-anchor="middle" class="stepTitle">skill_manager</text>
  <text x="680" y="426" text-anchor="middle" class="note">skill lifecycle</text>

  <rect x="776" y="380" width="160" height="84" rx="12" fill="#1f355a" stroke="#5b8fd2" />
  <text x="856" y="408" text-anchor="middle" class="stepTitle">help_center</text>
  <text x="856" y="426" text-anchor="middle" class="note">help/capability docs</text>

  <rect x="952" y="380" width="160" height="84" rx="12" fill="#2b2d4f" stroke="#8f78ca" />
  <text x="1032" y="408" text-anchor="middle" class="stepTitle">complex_task</text>
  <text x="1032" y="426" text-anchor="middle" class="note">cross-node orchestration</text>

  <path d="M860 250 V276" class="line" />
  <path d="M860 250 L680 276" class="dashed" />
  <path d="M860 250 L1032 276" class="dashed" />
  <path d="M860 250 L680 380" class="dashed" />
  <path d="M860 250 V380" class="dashed" />
  <path d="M860 250 L1032 380" class="dashed" />

  <text x="620" y="500" class="section">Tool and Data Integration</text>

  <rect x="600" y="524" width="520" height="100" rx="12" fill="#21395c" stroke="#5a89c8" />
  <text x="620" y="552" class="stepTitle">Tool access model</text>
  <text x="620" y="570" class="stepText">router stores runtime tool metadata in state.extra.tool_catalog</text>
  <text x="620" y="588" class="stepText">nodes call tools via registry/toolsets wrappers (invoke_node_tool + LangChain tools)</text>
  <text x="620" y="606" class="stepText">common tools + node-scoped tools + MCP-backed tools</text>

  <rect x="600" y="644" width="250" height="120" rx="12" fill="#1f3557" stroke="#5b87c2" />
  <text x="725" y="672" text-anchor="middle" class="stepTitle">PostgreSQL</text>
  <text x="620" y="692" class="stepText">user/profile</text>
  <text x="620" y="710" class="stepText">messages/conversations</text>
  <text x="620" y="728" class="stepText">ledgers/schedules/reminders</text>
  <text x="620" y="746" class="stepText">long_term_memories</text>

  <rect x="870" y="644" width="250" height="120" rx="12" fill="#1f3557" stroke="#5b87c2" />
  <text x="995" y="672" text-anchor="middle" class="stepTitle">Redis + MCP</text>
  <text x="890" y="692" class="stepText">graph checkpoint state</text>
  <text x="890" y="710" class="stepText">pending caches</text>
  <text x="890" y="728" class="stepText">weather/fetch/custom tools</text>

  <path d="M680 464 V524" class="line" />
  <path d="M1032 464 V524" class="line-dashed" />
  <path d="M860 624 L725 644" class="line" />
  <path d="M860 624 L995 644" class="line" />

  <text x="600" y="812" class="section">Why memory list now works reliably</text>
  <rect x="600" y="834" width="520" height="80" rx="12" fill="#24304d" stroke="#7687b9" />
  <text x="620" y="860" class="stepText">- Memory listing requests bypass semantic top-k retrieval.</text>
  <text x="620" y="878" class="stepText">- Handler calls list_long_term_memories() with larger limit and direct rendering.</text>
  <text x="620" y="896" class="stepText">- Optional settle wait reduces read-after-write gaps from async upsert pipeline.</text>
</svg>
