<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 760" font-family="'Inter',system-ui,sans-serif">
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#94A3B8" flood-opacity="0.15"/>
    </filter>
    <filter id="lightShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94A3B8" flood-opacity="0.10"/>
    </filter>

    <!-- 箭头 refX=6 让箭尖露出来 markerWidth=9 加大 -->
    <marker id="arr" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#94A3B8"/>
    </marker>
    <marker id="arr-indigo" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#818CF8"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#34D399"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#A78BFA"/>
    </marker>
    <marker id="arr-pink" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#F472B6"/>
    </marker>
    <marker id="arr-yellow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#F59E0B"/>
    </marker>
    <marker id="arr-cyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#22D3EE"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#F87171"/>
    </marker>

    <style>
      @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
      .pulse-dot { animation: pulse 3s ease-in-out infinite; }
      .float-box { animation: float 4s ease-in-out infinite; }
      .hover-card {
        transition: transform .3s cubic-bezier(.34,1.56,.64,1), filter .3s ease;
        transform-origin: center; transform-box: fill-box;
      }
      .hover-card:hover { transform: scale(1.03); filter: drop-shadow(0 8px 12px rgba(148,163,184,.2)); }
      text { pointer-events: none; }
    </style>
  </defs>

  <rect width="960" height="760" rx="32" fill="#F8FAFC"/>

  <!-- ====== 连线层 ====== -->

  <!-- 1. Entry → _route_setup (垂直) -->
  <line x1="480" y1="136" x2="480" y2="164" stroke="#818CF8" stroke-width="2.5" marker-end="url(#arr-indigo)" opacity="0.8"/>

  <!-- 2. _route_setup → 说明框 (水平) -->
  <line x1="622" y1="194" x2="695" y2="194" stroke="#34D399" stroke-width="2" marker-end="url(#arr-green)" opacity="0.65"/>

  <!-- 3. _route_setup → Onboarding (L型折线: 先左后下) -->
  <path d="M 380 222 L 160 222 L 160 274" fill="none" stroke="#A78BFA" stroke-width="2.5" marker-end="url(#arr-purple)" opacity="0.75"/>

  <!-- 4. _route_setup → Main Agent (L型折线: 先右后下) -->
  <path d="M 570 222 L 490 222 L 490 274" fill="none" stroke="#F472B6" stroke-width="2.5" marker-end="url(#arr-pink)" opacity="0.75"/>

  <!-- 5. Main Agent → 工具注册中心 (垂直) -->
  <line x1="490" y1="420" x2="490" y2="444" stroke="#F472B6" stroke-width="2.5" marker-end="url(#arr-pink)" opacity="0.75"/>

  <!-- 6. 工具注册中心 → 6个工具 (垂直短线，不用斜线) -->
  <line x1="110" y1="484" x2="110" y2="500" stroke="#F59E0B" stroke-width="2" marker-end="url(#arr-yellow)" opacity="0.65"/>
  <line x1="250" y1="484" x2="250" y2="500" stroke="#F59E0B" stroke-width="2" marker-end="url(#arr-yellow)" opacity="0.65"/>
  <line x1="390" y1="484" x2="390" y2="500" stroke="#F59E0B" stroke-width="2" marker-end="url(#arr-yellow)" opacity="0.65"/>
  <line x1="530" y1="484" x2="530" y2="500" stroke="#F59E0B" stroke-width="2" marker-end="url(#arr-yellow)" opacity="0.65"/>
  <line x1="670" y1="484" x2="670" y2="500" stroke="#F59E0B" stroke-width="2" marker-end="url(#arr-yellow)" opacity="0.65"/>
  <line x1="830" y1="484" x2="830" y2="500" stroke="#F59E0B" stroke-width="2" marker-end="url(#arr-yellow)" opacity="0.65"/>
  <!-- 工具注册中心 水平分发线 -->
  <line x1="110" y1="480" x2="830" y2="480" stroke="#F59E0B" stroke-width="1.5" opacity="0.4"/>
  <!-- 工具注册中心 → 分发线 (垂直) -->
  <line x1="490" y1="476" x2="490" y2="480" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>

  <!-- 7. MCP工具 → MCP Fetch Server (垂直) -->
  <line x1="830" y1="556" x2="830" y2="576" stroke="#22D3EE" stroke-width="2" marker-end="url(#arr-cyan)" opacity="0.65"/>

  <!-- 8. Onboarding → END (L型: 先下后右) -->
  <path d="M 160 420 L 160 632 L 406 632" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)" opacity="0.55"/>

  <!-- 9. Main Agent → END (L型: 先右后下后左, 绕开工具区) -->
  <path d="M 672 400 L 910 400 L 910 632 L 554 632" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)" opacity="0.55"/>

  <!-- 10. END → 多平台投递 (垂直) -->
  <line x1="480" y1="652" x2="480" y2="672" stroke="#F87171" stroke-width="2" marker-end="url(#arr-red)" opacity="0.55"/>


  <!-- ====== 卡片层 ====== -->

  <!-- 标题 -->
  <text x="480" y="42" text-anchor="middle" fill="#1E293B" font-size="24" font-weight="800" letter-spacing="0.5">PAI · 单 Agent 工作流</text>
  <text x="480" y="68" text-anchor="middle" fill="#64748B" font-size="13" font-weight="500">LangGraph StateGraph · create_react_agent · astream_events 流式 · tool_event 实时推送</text>

  <!-- Entry Point -->
  <g class="float-box" style="animation-delay:0s"><g class="hover-card">
    <rect x="380" y="90" width="200" height="44" rx="22" fill="#FFFFFF" stroke="#818CF8" stroke-width="2" filter="url(#softShadow)"/>
    <text x="480" y="116" text-anchor="middle" fill="#4F46E5" font-size="13" font-weight="800">▶ Entry Point</text>
  </g></g>
  <circle cx="480" cy="112" r="3.5" fill="#818CF8" class="pulse-dot"/>

  <!-- set_entry_point 标注 -->
  <rect x="600" y="92" width="130" height="40" rx="10" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="665" y="109" text-anchor="middle" fill="#4F46E5" font-size="10" font-weight="700">set_entry_point</text>
  <text x="665" y="123" text-anchor="middle" fill="#64748B" font-size="9">graph.ainvoke(state)</text>

  <!-- _route_setup -->
  <g class="hover-card">
    <rect x="340" y="168" width="280" height="54" rx="14" fill="#FFFFFF" stroke="#34D399" stroke-width="2" filter="url(#softShadow)"/>
    <text x="480" y="192" text-anchor="middle" fill="#059669" font-size="14" font-weight="800">🔀 _route_setup()</text>
    <text x="480" y="210" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">user_setup_stage &lt; 3 ? → onboarding : agent</text>
  </g>
  <circle cx="480" cy="192" r="3.5" fill="#34D399" class="pulse-dot"/>

  <!-- 分叉标签 -->
  <text x="250" y="218" fill="#7C3AED" font-size="10" font-weight="700">setup &lt; 3</text>
  <text x="520" y="240" fill="#DB2777" font-size="10" font-weight="700">setup ≥ 3</text>

  <!-- 说明框 -->
  <g class="hover-card" filter="url(#softShadow)">
    <rect x="700" y="158" width="230" height="76" rx="12" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="720" y="178" fill="#059669" font-size="11" font-weight="800">🧠 简化路由</text>
    <line x1="710" y1="186" x2="920" y2="186" stroke="#CBD5E1" stroke-width="1"/>
    <text x="720" y="202" fill="#64748B" font-size="9">无 LLM 意图分类开销</text>
    <text x="720" y="216" fill="#64748B" font-size="9">纯逻辑判断：setup_stage 检查</text>
    <text x="720" y="230" fill="#64748B" font-size="9">Agent 自主决定工具调用</text>
  </g>

  <!-- Onboarding 节点 -->
  <g class="float-box" style="animation-delay:0s"><g class="hover-card">
    <rect x="60" y="278" width="200" height="142" rx="12" fill="#F3E8FF" stroke="#E9D5FF" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="160" y="302" text-anchor="middle" fill="#6B21A8" font-size="13" font-weight="800">🚀 Onboarding</text>
    <text x="160" y="318" text-anchor="middle" fill="#9333EA" font-size="10" font-weight="600">onboarding_node()</text>
    <line x1="72" y1="328" x2="248" y2="328" stroke="#D8B4FE" stroke-width="1"/>
    <text x="82" y="344" fill="#6B21A8" font-size="9">Step 1 设置昵称</text>
    <text x="82" y="360" fill="#6B21A8" font-size="9">Step 2 命名 AI</text>
    <text x="82" y="376" fill="#6B21A8" font-size="9">Step 3 确认完成</text>
    <line x1="72" y1="388" x2="248" y2="388" stroke="#D8B4FE" stroke-width="1"/>
    <text x="82" y="404" fill="#9333EA" font-size="9" font-style="italic">关键词预匹配 + LLM 提取</text>
  </g></g>

  <!-- Main Agent 节点 -->
  <g class="float-box" style="animation-delay:.3s"><g class="hover-card">
    <rect x="310" y="278" width="360" height="142" rx="12" fill="#FCE7F3" stroke="#FBCFE8" stroke-width="2" filter="url(#softShadow)"/>
    <text x="490" y="302" text-anchor="middle" fill="#9D174D" font-size="14" font-weight="800">🤖 Main Agent (ReAct)</text>
    <text x="490" y="318" text-anchor="middle" fill="#EC4899" font-size="10" font-weight="600">main_agent_node() → create_react_agent()</text>
    <line x1="322" y1="328" x2="658" y2="328" stroke="#F9A8D4" stroke-width="1"/>
    <text x="332" y="344" fill="#9D174D" font-size="9">自主决策：根据用户消息自动选择工具</text>
    <text x="332" y="360" fill="#9D174D" font-size="9">多工具链式调用：同一轮对话可调用多个工具</text>
    <text x="332" y="376" fill="#9D174D" font-size="9">tool_event 推送：工具开始/完成状态实时通知客户端</text>
    <line x1="322" y1="388" x2="658" y2="388" stroke="#F9A8D4" stroke-width="1"/>
    <text x="332" y="404" fill="#DB2777" font-size="9" font-weight="700">astream_events(version="v2") 流式输出</text>
  </g></g>

  <!-- 工具注册中心 -->
  <g class="hover-card">
    <rect x="420" y="448" width="140" height="28" rx="10" fill="#FFFFFF" stroke="#F472B6" stroke-width="2" filter="url(#softShadow)"/>
    <text x="490" y="466" text-anchor="middle" fill="#DB2777" font-size="11" font-weight="800">🔧 工具注册中心</text>
  </g>
  <circle cx="490" cy="462" r="3" fill="#DB2777" class="pulse-dot"/>

  <!-- 6个工具卡片 -->
  <g class="hover-card">
    <rect x="48" y="504" width="124" height="52" rx="10" fill="#DCFCE7" stroke="#BBF7D0" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="110" y="524" text-anchor="middle" fill="#166534" font-size="10" font-weight="800">💰 记账工具</text>
    <text x="110" y="540" text-anchor="middle" fill="#22C55E" font-size="8">insert·update·delete</text>
    <text x="110" y="552" text-anchor="middle" fill="#22C55E" font-size="8">text2sql·receipt</text>
  </g>
  <g class="hover-card">
    <rect x="188" y="504" width="124" height="52" rx="10" fill="#DBEAFE" stroke="#BFDBFE" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="250" y="524" text-anchor="middle" fill="#1E3A8A" font-size="10" font-weight="800">📅 日程工具</text>
    <text x="250" y="540" text-anchor="middle" fill="#3B82F6" font-size="8">insert·update·delete</text>
    <text x="250" y="552" text-anchor="middle" fill="#3B82F6" font-size="8">list · APScheduler</text>
  </g>
  <g class="hover-card">
    <rect x="328" y="504" width="124" height="52" rx="10" fill="#F3E8FF" stroke="#E9D5FF" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="390" y="524" text-anchor="middle" fill="#6B21A8" font-size="10" font-weight="800">🧠 记忆工具</text>
    <text x="390" y="540" text-anchor="middle" fill="#9333EA" font-size="8">memory_list</text>
    <text x="390" y="552" text-anchor="middle" fill="#9333EA" font-size="8">profile query·update</text>
  </g>
  <g class="hover-card">
    <rect x="468" y="504" width="124" height="52" rx="10" fill="#FFEDD5" stroke="#FED7AA" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="530" y="524" text-anchor="middle" fill="#9A3412" font-size="10" font-weight="800">💬 会话工具</text>
    <text x="530" y="540" text-anchor="middle" fill="#F97316" font-size="8">conversation_current</text>
    <text x="530" y="552" text-anchor="middle" fill="#F97316" font-size="8">conversation_list</text>
  </g>
  <g class="hover-card">
    <rect x="608" y="504" width="124" height="52" rx="10" fill="#CFFAFE" stroke="#A5F3FC" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="670" y="524" text-anchor="middle" fill="#155E75" font-size="10" font-weight="800">🌐 网络工具</text>
    <text x="670" y="540" text-anchor="middle" fill="#06B6D4" font-size="8">fetch_url</text>
    <text x="670" y="552" text-anchor="middle" fill="#06B6D4" font-size="8">maps_weather</text>
  </g>
  <g class="hover-card">
    <rect x="768" y="504" width="124" height="52" rx="10" fill="#FEF9C3" stroke="#FDE047" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="830" y="524" text-anchor="middle" fill="#A16207" font-size="10" font-weight="800">🔌 MCP 工具</text>
    <text x="830" y="540" text-anchor="middle" fill="#CA8A04" font-size="8">mcp_list_tools</text>
    <text x="830" y="552" text-anchor="middle" fill="#CA8A04" font-size="8">mcp_call_tool</text>
  </g>

  <!-- MCP Fetch Server -->
  <g class="hover-card">
    <rect x="750" y="580" width="160" height="34" rx="12" fill="#FFFFFF" stroke="#22D3EE" stroke-width="2" filter="url(#softShadow)"/>
    <text x="830" y="602" text-anchor="middle" fill="#0891B2" font-size="11" font-weight="800">🔌 MCP Fetch Server</text>
  </g>
  <circle cx="830" cy="597" r="2.5" fill="#0891B2" class="pulse-dot"/>
  <text x="830" y="628" text-anchor="middle" fill="#64748B" font-size="8" font-style="italic">Streamable HTTP · JSON-RPC 2.0</text>

  <!-- END 节点 -->
  <g class="hover-card">
    <rect x="410" y="618" width="140" height="40" rx="20" fill="#FFFFFF" stroke="#F87171" stroke-width="2" filter="url(#softShadow)"/>
    <text x="480" y="643" text-anchor="middle" fill="#DC2626" font-size="14" font-weight="800">🏁 END</text>
  </g>
  <circle cx="480" cy="638" r="3.5" fill="#DC2626" class="pulse-dot"/>

  <!-- 多平台投递 -->
  <text x="480" y="690" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">responses: List[str] → UnifiedSender → 多平台投递</text>

  <!-- 底部信息 -->
  <g class="hover-card">
    <rect x="30" y="706" width="280" height="42" rx="12" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="48" y="724" fill="#4F46E5" font-size="10" font-weight="800">📦 GraphState</text>
    <text x="48" y="738" fill="#64748B" font-size="9" font-family="monospace">user_id · conv_id · setup_stage · message · responses</text>
  </g>
  <g class="hover-card">
    <rect x="330" y="706" width="310" height="42" rx="12" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="348" y="724" fill="#059669" font-size="10" font-weight="800">🗄️ 数据存储</text>
    <text x="348" y="738" fill="#64748B" font-size="9" font-family="monospace">PostgreSQL · Redis checkpointer · pending_ledger</text>
  </g>
  <g class="hover-card">
    <rect x="660" y="706" width="270" height="42" rx="12" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="678" y="722" fill="#1E293B" font-size="10" font-weight="800">📐 图例</text>
    <line x1="730" y1="720" x2="760" y2="720" stroke="#A78BFA" stroke-width="2.5"/><text x="768" y="723" fill="#64748B" font-size="8">条件边</text>
    <line x1="820" y1="720" x2="850" y2="720" stroke="#F59E0B" stroke-width="2.5"/><text x="858" y="723" fill="#64748B" font-size="8">工具调用</text>
    <line x1="730" y1="738" x2="760" y2="738" stroke="#F472B6" stroke-width="2.5"/><text x="768" y="741" fill="#64748B" font-size="8">Agent 流</text>
    <circle cx="830" cy="736" r="3" fill="#DB2777" class="pulse-dot"/><text x="842" y="739" fill="#64748B" font-size="8">决策点</text>
  </g>

</svg>