<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 880" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <!-- 卡片外阴影 -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#94A3B8" flood-opacity="0.12"/>
    </filter>
    <!-- 浅色内嵌阴影 -->
    <filter id="lightShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94A3B8" flood-opacity="0.08"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#CBD5E1" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#86EFAC" />
    </marker>

    <style>
      @keyframes dash { to { stroke-dashoffset: -32; } }
      @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
      .flow-line { stroke-dasharray: 8 8; animation: dash 2.5s linear infinite; }
      .pulse-node { animation: pulse 3s ease-in-out infinite; }
      .float-box { animation: float 4s ease-in-out infinite; }
      .hover-card { 
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s ease; 
        transform-origin: center; 
        transform-box: fill-box;
      }
      .hover-card:hover { 
        transform: scale(1.03); 
        filter: drop-shadow(0 10px 15px rgba(148, 163, 184, 0.2)); 
      }
      text { pointer-events: none; }
    </style>
  </defs>

  <rect width="960" height="880" rx="32" fill="#F8FAFC"/>

  <text x="480" y="46" text-anchor="middle" fill="#1E293B" font-size="24" font-weight="800" letter-spacing="0.5">PAI · 智能体决策调度流程</text>
  <text x="480" y="72" text-anchor="middle" fill="#64748B" font-size="13" font-weight="500">LangGraph StateGraph · LLM 意图分类 · MCP 工具协议 · 条件边路由 · Redis Checkpointer</text>

  <g class="float-box" style="animation-delay:0s">
    <g class="hover-card">
      <rect x="380" y="84" width="200" height="44" rx="22" fill="#FFFFFF" stroke="#818CF8" stroke-width="2" filter="url(#softShadow)"/>
      <text x="480" y="111" text-anchor="middle" fill="#4F46E5" font-size="13" font-weight="800">▶ Entry Point</text>
    </g>
  </g>
  <circle cx="480" cy="106" r="3" fill="#818CF8" class="pulse-node"/>

  <rect x="590" y="84" width="134" height="44" rx="12" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="657" y="103" text-anchor="middle" fill="#4F46E5" font-size="10" font-weight="700">set_entry_point</text>
  <text x="657" y="118" text-anchor="middle" fill="#64748B" font-size="9">graph.ainvoke(state)</text>

  <line x1="480" y1="128" x2="480" y2="166" class="flow-line" stroke="#818CF8" stroke-width="2" opacity="0.6"/>

  <g class="hover-card">
