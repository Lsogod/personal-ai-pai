<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 780" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#94A3B8" flood-opacity="0.12"/>
    </filter>
    <filter id="lightShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94A3B8" flood-opacity="0.08"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#CBD5E1" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#86EFAC" />
    </marker>
    <marker id="arrow-pink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#F9A8D4" />
    </marker>

    <style>
      @keyframes dash { to { stroke-dashoffset: -32; } }
      @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
      .flow-line { stroke-dasharray: 8 8; animation: dash 2.5s linear infinite; }
      .pulse-node { animation: pulse 3s ease-in-out infinite; }
      .float-box { animation: float 4s ease-in-out infinite; }
      .hover-card {
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s ease;
        transform-origin: center;
        transform-box: fill-box;
      }
      .hover-card:hover {
        transform: scale(1.03);
        filter: drop-shadow(0 10px 15px rgba(148, 163, 184, 0.2));
      }
      text { pointer-events: none; }
    </style>
  </defs>

  <rect width="960" height="780" rx="32" fill="#F8FAFC"/>

  <!-- 标题 -->
  <text x="480" y="46" text-anchor="middle" fill="#1E293B" font-size="24" font-weight="800" letter-spacing="0.5">PAI · 单 Agent 工作流</text>
  <text x="480" y="72" text-anchor="middle" fill="#64748B" font-size="13" font-weight="500">LangGraph StateGraph · create_react_agent · astream_events 流式 · tool_event 实时推送</text>

  <!-- Entry Point -->
  <g class="float-box" style="animation-delay:0s">
    <g class="hover-card">
      <rect x="380" y="90" width="200" height="44" rx="22" fill="#FFFFFF" stroke="#818CF8" stroke-width="2" filter="url(#softShadow)"/>
      <text x="480" y="117" text-anchor="middle" fill="#4F46E5" font-size="13" font-weight="800">▶ Entry Point</text>
    </g>
  </g>
  <circle cx="480" cy="112" r="3" fill="#818CF8" class="pulse-node"/>

  <rect x="600" y="90" width="140" height="44" rx="12" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="670" y="109" text-anchor="middle" fill="#4F46E5" font-size="10" font-weight="700">set_entry_point</text>
  <text x="670" y="124" text-anchor="middle" fill="#64748B" font-size="9">graph.ainvoke(state)</text>

  <!-- Entry -> Condition -->
  <line x1="480" y1="134" x2="480" y2="170" class="flow-line" stroke="#818CF8" stroke-width="2" opacity="0.6"/>

  <!-- 条件判断 -->
  <g class="hover-card">
    <rect x="340" y="170" width="280" height="54" rx="14" fill="#FFFFFF" stroke="#34D399" stroke-width="2" filter="url(#softShadow)"/>
    <text x="480" y="193" text-anchor="middle" fill="#059669" font-size="14" font-weight="800">🔀 _route_setup()</text>
    <text x="480" y="210" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">user_setup_stage &lt; 3 ? → onboarding : agent</text>
  </g>
  <circle cx="480" cy="193" r="3" fill="#34D399" class="pulse-node"/>

  <!-- 说明框 -->
  <g class="hover-card" filter="url(#softShadow)">
    <rect x="700" y="156" width="230" height="80" rx="12" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="720" y="176" fill="#059669" font-size="11" font-weight="800">🧠 简化路由</text>
    <line x1="710" y1="184" x2="920" y2="184" stroke="#CBD5E1" stroke-width="1"/>
    <text x="720" y="200" fill="#64748B" font-size="9">无 LLM 意图分类开销</text>
    <text x="720" y="214" fill="#64748B" font-size="9">纯逻辑判断：setup_stage 检查</text>
    <text x="720" y="228" fill="#64748B" font-size="9">Agent 自主决定工具调用</text>
  </g>

  <line x1="620" y1="190" x2="700" y2="190" class="flow-line" stroke="#86EFAC" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- 条件分支 -->
  <g stroke="#CBD5E1" stroke-width="2" class="flow-line" opacity="0.6">
    <path d="M 400 224 L 160 280" marker-end="url(#arrow)" style="animation-delay:.1s"/>
    <path d="M 560 224 L 480 280" marker-end="url(#arrow)" style="animation-delay:.2s"/>
  </g>

  <text x="260" y="258" fill="#7C3AED" font-size="10" font-weight="700" transform="rotate(-12,260,258)">setup &lt; 3</text>
  <text x="540" y="258" fill="#DB2777" font-size="10" font-weight="700">setup ≥ 3</text>

  <!-- Onboarding -->
  <g class="float-box" style="animation-delay:0s">
    <g class="hover-card">
      <rect x="60" y="280" width="200" height="140" rx="12" fill="#F3E8FF" stroke="#E9D5FF" stroke-width="1.5" filter="url(#softShadow)"/>
      <text x="160" y="304" text-anchor="middle" fill="#6B21A8" font-size="13" font-weight="800">🚀 Onboarding</text>
      <text x="160" y="320" text-anchor="middle" fill="#9333EA" font-size="10" font-weight="600">onboarding_node()</text>
      <line x1="72" y1="330" x2="248" y2="330" stroke="#D8B4FE" stroke-width="1"/>
      <text x="80" y="346" fill="#6B21A8" font-size="9">Step 1 设置昵称</text>
      <text x="80" y="362" fill="#6B21A8" font-size="9">Step 2 命名 AI</text>
      <text x="80" y="378" fill="#6B21A8" font-size="9">Step 3 确认完成</text>
      <line x1="72" y1="388" x2="248" y2="388" stroke="#D8B4FE" stroke-width="1"/>
      <text x="80" y="404" fill="#9333EA" font-size="9" font-style="italic">关键词预匹配 + LLM 提取</text>
    </g>
  </g>

  <!-- Main Agent -->
  <g class="float-box" style="animation-delay:.3s">
    <g class="hover-card">
      <rect x="310" y="280" width="360" height="140" rx="12" fill="#FCE7F3" stroke="#FBCFE8" stroke-width="2" filter="url(#softShadow)"/>
      <text x="490" y="304" text-anchor="middle" fill="#9D174D" font-size="14" font-weight="800">🤖 Main Agent (ReAct)</text>
      <text x="490" y="320" text-anchor="middle" fill="#EC4899" font-size="10" font-weight="600">main_agent_node() → create_react_agent()</text>
      <line x1="322" y1="330" x2="658" y2="330" stroke="#F9A8D4" stroke-width="1"/>
      <text x="330" y="346" fill="#9D174D" font-size="9">自主决策：根据用户消息自动选择工具</text>
      <text x="330" y="362" fill="#9D174D" font-size="9">多工具链式调用：同一轮对话可调用多个工具</text>
      <text x="330" y="378" fill="#9D174D" font-size="9">tool_event 推送：工具开始/完成状态实时通知客户端</text>
      <line x1="322" y1="388" x2="658" y2="388" stroke="#F9A8D4" stroke-width="1"/>
      <text x="330" y="404" fill="#DB2777" font-size="9" font-weight="700">astream_events(version="v2") 流式输出</text>
    </g>
  </g>

  <!-- Agent -> Tools 连线 -->
  <line x1="490" y1="420" x2="490" y2="460" class="flow-line" stroke="#F472B6" stroke-width="2" opacity="0.6"/>

  <!-- Tool 集合 -->
  <g stroke="#FDE047" stroke-width="2" class="flow-line" opacity="0.6">
    <line x1="490" y1="480" x2="110" y2="510" style="animation-delay:.1s"/>
    <line x1="490" y1="480" x2="250" y2="510" style="animation-delay:.2s"/>
    <line x1="490" y1="480" x2="390" y2="510" style="animation-delay:.3s"/>
    <line x1="490" y1="480" x2="530" y2="510" style="animation-delay:.4s"/>
    <line x1="490" y1="480" x2="670" y2="510" style="animation-delay:.5s"/>
    <line x1="490" y1="480" x2="830" y2="510" style="animation-delay:.6s"/>
  </g>

  <g class="hover-card">
    <rect x="420" y="455" width="140" height="30" rx="10" fill="#FFFFFF" stroke="#F472B6" stroke-width="2" filter="url(#softShadow)"/>
    <text x="490" y="474" text-anchor="middle" fill="#DB2777" font-size="11" font-weight="800">🔧 工具注册中心</text>
    <circle cx="490" cy="470" r="2.5" fill="#DB2777" class="pulse-node"/>
  </g>

  <!-- 各工具卡片 -->
  <g class="hover-card">
    <rect x="48" y="510" width="124" height="50" rx="10" fill="#DCFCE7" stroke="#BBF7D0" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="110" y="530" text-anchor="middle" fill="#166534" font-size="10" font-weight="800">💰 记账工具</text>
    <text x="110" y="546" text-anchor="middle" fill="#22C55E" font-size="8">insert·update·delete</text>
    <text x="110" y="556" text-anchor="middle" fill="#22C55E" font-size="8">text2sql·receipt</text>
  </g>

  <g class="hover-card">
    <rect x="188" y="510" width="124" height="50" rx="10" fill="#DBEAFE" stroke="#BFDBFE" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="250" y="530" text-anchor="middle" fill="#1E3A8A" font-size="10" font-weight="800">📅 日程工具</text>
    <text x="250" y="546" text-anchor="middle" fill="#3B82F6" font-size="8">insert·update·delete</text>
    <text x="250" y="556" text-anchor="middle" fill="#3B82F6" font-size="8">list · APScheduler</text>
  </g>

  <g class="hover-card">
    <rect x="328" y="510" width="124" height="50" rx="10" fill="#F3E8FF" stroke="#E9D5FF" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="390" y="530" text-anchor="middle" fill="#6B21A8" font-size="10" font-weight="800">🧠 记忆工具</text>
    <text x="390" y="546" text-anchor="middle" fill="#9333EA" font-size="8">memory_list</text>
    <text x="390" y="556" text-anchor="middle" fill="#9333EA" font-size="8">profile query·update</text>
  </g>

  <g class="hover-card">
    <rect x="468" y="510" width="124" height="50" rx="10" fill="#FFEDD5" stroke="#FED7AA" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="530" y="530" text-anchor="middle" fill="#9A3412" font-size="10" font-weight="800">💬 会话工具</text>
    <text x="530" y="546" text-anchor="middle" fill="#F97316" font-size="8">conversation_current</text>
    <text x="530" y="556" text-anchor="middle" fill="#F97316" font-size="8">conversation_list</text>
  </g>

  <g class="hover-card">
    <rect x="608" y="510" width="124" height="50" rx="10" fill="#CFFAFE" stroke="#A5F3FC" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="670" y="530" text-anchor="middle" fill="#155E75" font-size="10" font-weight="800">🌐 网络工具</text>
    <text x="670" y="546" text-anchor="middle" fill="#06B6D4" font-size="8">fetch_url</text>
    <text x="670" y="556" text-anchor="middle" fill="#06B6D4" font-size="8">maps_weather</text>
  </g>

  <g class="hover-card">
    <rect x="768" y="510" width="124" height="50" rx="10" fill="#FEF9C3" stroke="#FDE047" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="830" y="530" text-anchor="middle" fill="#A16207" font-size="10" font-weight="800">🔌 MCP 工具</text>
    <text x="830" y="546" text-anchor="middle" fill="#CA8A04" font-size="8">mcp_list_tools</text>
    <text x="830" y="556" text-anchor="middle" fill="#CA8A04" font-size="8">mcp_call_tool</text>
  </g>

  <!-- 工具 -> MCP Server -->
  <line x1="830" y1="560" x2="830" y2="590" class="flow-line" stroke="#67E8F9" stroke-width="2" opacity="0.6"/>
  <g class="hover-card">
    <rect x="750" y="590" width="160" height="34" rx="12" fill="#FFFFFF" stroke="#22D3EE" stroke-width="2" filter="url(#softShadow)"/>
    <text x="830" y="612" text-anchor="middle" fill="#0891B2" font-size="11" font-weight="800">🔌 MCP Fetch Server</text>
    <circle cx="830" cy="607" r="2.5" fill="#0891B2" class="pulse-node"/>
  </g>
  <text x="830" y="640" text-anchor="middle" fill="#64748B" font-size="8" font-style="italic">Streamable HTTP · JSON-RPC 2.0</text>

  <!-- 流向 END -->
  <g class="flow-line" stroke="#CBD5E1" stroke-width="2" opacity="0.6">
    <path d="M 160 420 L 160 652" />
    <path d="M 490 420 L 490 440 L 490 560 L 490 652" />
  </g>

  <line x1="160" y1="652" x2="490" y2="652" stroke="#E2E8F0" stroke-width="2"/>
  <text x="340" y="646" text-anchor="middle" fill="#64748B" font-size="10" font-weight="600">add_edge("node", END)</text>

  <line x1="340" y1="652" x2="340" y2="678" class="flow-line" stroke="#CBD5E1" stroke-width="2" opacity="0.6"/>

  <g class="hover-card">
    <rect x="270" y="676" width="140" height="40" rx="20" fill="#FFFFFF" stroke="#F87171" stroke-width="2" filter="url(#softShadow)"/>
    <text x="340" y="701" text-anchor="middle" fill="#DC2626" font-size="14" font-weight="800">🏁 END</text>
    <circle cx="340" cy="696" r="3" fill="#DC2626" class="pulse-node"/>
  </g>

  <line x1="340" y1="716" x2="340" y2="736" class="flow-line" stroke="#F87171" stroke-width="2" opacity="0.4"/>
  <text x="340" y="750" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">responses: List[str] → UnifiedSender → 多平台投递</text>

  <!-- Infra 底部 -->
  <g class="hover-card">
    <rect x="520" y="660" width="210" height="50" rx="14" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="542" y="679" fill="#4F46E5" font-size="10" font-weight="800">📦 GraphState</text>
    <text x="542" y="693" fill="#64748B" font-size="9" font-family="monospace">user_id · conv_id · setup_stage</text>
    <text x="542" y="705" fill="#64748B" font-size="9" font-family="monospace">message · responses · extra</text>
  </g>

  <g class="hover-card">
    <rect x="740" y="660" width="200" height="50" rx="14" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="760" y="679" fill="#1E293B" font-size="10" font-weight="800">📐 图例</text>
    <line x1="800" y1="678" x2="830" y2="678" stroke="#34D399" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="838" y="681" fill="#64748B" font-size="8" font-weight="600">条件边</text>
    <line x1="800" y1="694" x2="830" y2="694" stroke="#FBBF24" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="838" y="697" fill="#64748B" font-size="8" font-weight="600">工具调用</text>
    <circle cx="808" cy="706" r="2.5" fill="#DB2777" class="pulse-node"/>
    <text x="838" y="709" fill="#64748B" font-size="8" font-weight="600">核心决策点</text>
  </g>

</svg>