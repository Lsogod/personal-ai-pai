<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 920" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="100%" stop-color="#101a2f" />
    </linearGradient>
    <style>
      .title { fill: #e6edf7; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #97a7c3; font-size: 14px; }
      .lane-title { fill: #cfe0ff; font-size: 16px; font-weight: 700; }
      .box-title { fill: #f8fbff; font-size: 14px; font-weight: 700; }
      .box-text { fill: #b8c6de; font-size: 12px; }
      .small { fill: #90a2c2; font-size: 11px; }
      .line { stroke: #5f7db4; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .line-dashed { stroke: #5f7db4; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#7ea2df" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="920" fill="url(#bg)" />

  <text x="640" y="46" text-anchor="middle" class="title">PAI System Architecture</text>
  <text x="640" y="70" text-anchor="middle" class="subtitle">Updated for latest routing + memory pipeline (2026-02-23)</text>

  <rect x="30" y="90" width="1220" height="120" rx="14" fill="#15233d" stroke="#2a416d" />
  <text x="50" y="118" class="lane-title">Client and Gateway Layer</text>

  <rect x="50" y="130" width="130" height="52" rx="10" fill="#1f3357" stroke="#3e629e" />
  <text x="115" y="154" text-anchor="middle" class="box-title">Web</text>
  <text x="115" y="171" text-anchor="middle" class="small">SSE + WS</text>

  <rect x="195" y="130" width="130" height="52" rx="10" fill="#1f3357" stroke="#3e629e" />
  <text x="260" y="154" text-anchor="middle" class="box-title">Miniapp</text>
  <text x="260" y="171" text-anchor="middle" class="small">WS + subscribe</text>

  <rect x="340" y="130" width="130" height="52" rx="10" fill="#1f3357" stroke="#3e629e" />
  <text x="405" y="154" text-anchor="middle" class="box-title">Telegram</text>
  <text x="405" y="171" text-anchor="middle" class="small">Webhook/Polling</text>

  <rect x="485" y="130" width="130" height="52" rx="10" fill="#1f3357" stroke="#3e629e" />
  <text x="550" y="154" text-anchor="middle" class="box-title">Feishu / WeChat / QQ</text>
  <text x="550" y="171" text-anchor="middle" class="small">Gateway callbacks</text>

  <rect x="640" y="118" width="280" height="76" rx="12" fill="#20365e" stroke="#4c76be" />
  <text x="780" y="145" text-anchor="middle" class="box-title">FastAPI Message Handler</text>
  <text x="780" y="164" text-anchor="middle" class="box-text">auth, dedup, conversation command, graph invoke</text>
  <text x="780" y="181" text-anchor="middle" class="box-text">response dispatch + audit logs</text>

  <rect x="940" y="118" width="290" height="76" rx="12" fill="#1f2e4c" stroke="#486aab" />
  <text x="1085" y="145" text-anchor="middle" class="box-title">Command Fallback</text>
  <text x="1085" y="164" text-anchor="middle" class="box-text">/bind, /calendar, /tool, /skill and related command parsers</text>
  <text x="1085" y="181" text-anchor="middle" class="box-text">run before graph execution when matched</text>

  <rect x="30" y="230" width="1220" height="230" rx="14" fill="#12213a" stroke="#2a416d" />
  <text x="50" y="258" class="lane-title">Agent Graph Layer (LangGraph StateGraph)</text>

  <rect x="80" y="282" width="220" height="66" rx="12" fill="#1d2f51" stroke="#3f639e" />
  <text x="190" y="307" text-anchor="middle" class="box-title">router_node</text>
  <text x="190" y="325" text-anchor="middle" class="box-text">LLM structured intent classification</text>
  <text x="190" y="341" text-anchor="middle" class="box-text">complex-task eligibility check</text>

  <rect x="335" y="282" width="170" height="66" rx="12" fill="#1f3154" stroke="#4b77c1" />
  <text x="420" y="307" text-anchor="middle" class="box-title">chat_manager</text>
  <text x="420" y="325" text-anchor="middle" class="box-text">general chat + tools</text>

  <rect x="525" y="282" width="170" height="66" rx="12" fill="#1f3154" stroke="#4b77c1" />
  <text x="610" y="307" text-anchor="middle" class="box-title">ledger_manager</text>
  <text x="610" y="325" text-anchor="middle" class="box-text">ledger CRUD + correction</text>

  <rect x="715" y="282" width="170" height="66" rx="12" fill="#1f3154" stroke="#4b77c1" />
  <text x="800" y="307" text-anchor="middle" class="box-title">schedule_manager</text>
  <text x="800" y="325" text-anchor="middle" class="box-text">reminder/calendar workflows</text>

  <rect x="905" y="282" width="170" height="66" rx="12" fill="#1f3154" stroke="#4b77c1" />
  <text x="990" y="307" text-anchor="middle" class="box-title">skill_manager</text>
  <text x="990" y="325" text-anchor="middle" class="box-text">skill operations</text>

  <rect x="1095" y="282" width="120" height="66" rx="12" fill="#1f3154" stroke="#4b77c1" />
  <text x="1155" y="307" text-anchor="middle" class="box-title">help</text>
  <text x="1155" y="325" text-anchor="middle" class="box-text">guidance</text>

  <rect x="420" y="372" width="440" height="64" rx="12" fill="#2f2343" stroke="#8b5cc2" />
  <text x="640" y="397" text-anchor="middle" class="box-title">complex_task_node</text>
  <text x="640" y="415" text-anchor="middle" class="box-text">cross-node orchestration + JSON plan execution</text>
  <text x="640" y="431" text-anchor="middle" class="box-text">only when >= 2 domain nodes are required</text>

  <path d="M300 315 H335" class="line" />
  <path d="M300 315 H525" class="line-dashed" />
  <path d="M300 315 H715" class="line-dashed" />
  <path d="M300 315 H905" class="line-dashed" />
  <path d="M300 315 H1095" class="line-dashed" />
  <path d="M190 348 C250 382, 330 398, 420 404" class="line-dashed" />

  <rect x="30" y="480" width="1220" height="200" rx="14" fill="#102438" stroke="#2a416d" />
  <text x="50" y="508" class="lane-title">Memory Layer (latest behavior)</text>

  <rect x="60" y="528" width="380" height="132" rx="12" fill="#1a3345" stroke="#3d7a96" />
  <text x="250" y="553" text-anchor="middle" class="box-title">Path A: Memory List Query (full list)</text>
  <text x="80" y="576" class="box-text">Trigger examples: "what are my long-term memories"</text>
  <text x="80" y="594" class="box-text">message_handler detects list intent via regex</text>
  <text x="80" y="612" class="box-text">waits brief background settle window (2.5s)</text>
  <text x="80" y="630" class="box-text">calls list_long_term_memories(user_id, high limit)</text>
  <text x="80" y="648" class="box-text">returns full visible list directly (skip graph top-k retrieval)</text>

  <rect x="455" y="528" width="360" height="132" rx="12" fill="#1d3049" stroke="#4f6f9f" />
  <text x="635" y="553" text-anchor="middle" class="box-title">Path B: Normal Chat Query (relevant memories)</text>
  <text x="475" y="576" class="box-text">retrieve_relevant_long_term_memories(query, top-k)</text>
  <text x="475" y="594" class="box-text">injects into state.extra.long_term_memories</text>
  <text x="475" y="612" class="box-text">router + domain node consume context</text>
  <text x="475" y="630" class="box-text">semantic relevance optimization for prompt token usage</text>

  <rect x="830" y="528" width="390" height="132" rx="12" fill="#2a2942" stroke="#8a7bbb" />
  <text x="1025" y="553" text-anchor="middle" class="box-title">Async Write Pipeline (background task)</text>
  <text x="850" y="576" class="box-text">after response: extract_memory_candidates(...)</text>
  <text x="850" y="594" class="box-text">then upsert_long_term_memories(...)</text>
  <text x="850" y="612" class="box-text">dedupe + confidence threshold + identity filtering</text>
  <text x="850" y="630" class="box-text">eventual consistency by design</text>

  <path d="M780 194 V255 H190 V282" class="line-dashed" />
  <path d="M780 194 V255 H640 V372" class="line-dashed" />
  <path d="M780 194 V528 H250" class="line" />
  <path d="M780 194 V528 H635" class="line-dashed" />
  <path d="M780 194 V528 H1025" class="line-dashed" />

  <rect x="30" y="700" width="1220" height="190" rx="14" fill="#111d31" stroke="#2a416d" />
  <text x="50" y="728" class="lane-title">Infra and Tooling</text>

  <rect x="60" y="748" width="240" height="110" rx="12" fill="#1f3553" stroke="#4e78b9" />
  <text x="180" y="773" text-anchor="middle" class="box-title">PostgreSQL</text>
  <text x="80" y="796" class="box-text">users, conversations, messages, ledgers,</text>
  <text x="80" y="814" class="box-text">schedules, reminder deliveries, memories</text>

  <rect x="320" y="748" width="220" height="110" rx="12" fill="#1f3553" stroke="#4e78b9" />
  <text x="430" y="773" text-anchor="middle" class="box-title">Redis</text>
  <text x="340" y="796" class="box-text">LangGraph checkpointer</text>
  <text x="340" y="814" class="box-text">pending ledger state cache</text>

  <rect x="560" y="748" width="300" height="110" rx="12" fill="#23405c" stroke="#5f94c2" />
  <text x="710" y="773" text-anchor="middle" class="box-title">Tool Registry and Toolsets</text>
  <text x="580" y="796" class="box-text">list_runtime_tool_metas() for catalog in router state</text>
  <text x="580" y="814" class="box-text">invoke_node_tool() / LangChain tool wrappers</text>

  <rect x="880" y="748" width="340" height="110" rx="12" fill="#27425f" stroke="#6c9aca" />
  <text x="1050" y="773" text-anchor="middle" class="box-title">External MCP / Integrations</text>
  <text x="900" y="796" class="box-text">maps_weather, fetch, custom MCP tools</text>
  <text x="900" y="814" class="box-text">called through registered tool interfaces</text>

  <path d="M610 348 V748" class="line-dashed" />
  <path d="M800 348 V748" class="line-dashed" />
</svg>
