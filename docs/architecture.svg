<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f14"/>
      <stop offset="100%" stop-color="#1a1a28"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <style>
      @keyframes dash { to { stroke-dashoffset: -20; } }
      @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
      .flow-line { stroke-dasharray: 6 4; animation: dash 1.5s linear infinite; }
      .pulse-node { animation: pulse 3s ease-in-out infinite; }
      .float-box { animation: float 4s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">PAI · Personal AI Assistant — 系统架构</text>
  <text x="480" y="62" text-anchor="middle" fill="#64748b" font-size="11">多平台智能助手 · LangGraph 工作流 · MCP 工具协议 · 实时流式响应</text>

  <!-- ═══════ Layer 1: Platforms ═══════ -->
  <g class="float-box" style="animation-delay: 0s">
    <rect x="60" y="88" width="100" height="44" rx="12" fill="#1e1e2e" stroke="#818cf8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="110" y="114" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="600">✈️ Telegram</text>
  </g>
  <g class="float-box" style="animation-delay: 0.3s">
    <rect x="180" y="88" width="100" height="44" rx="12" fill="#1e1e2e" stroke="#818cf8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="230" y="114" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="600">💬 微信</text>
  </g>
  <g class="float-box" style="animation-delay: 0.6s">
    <rect x="300" y="88" width="100" height="44" rx="12" fill="#1e1e2e" stroke="#818cf8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="350" y="114" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="600">🐧 QQ</text>
  </g>
  <g class="float-box" style="animation-delay: 0.9s">
    <rect x="420" y="88" width="100" height="44" rx="12" fill="#1e1e2e" stroke="#818cf8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="470" y="114" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="600">🐦 飞书</text>
  </g>
  <g class="float-box" style="animation-delay: 1.2s">
    <rect x="540" y="88" width="100" height="44" rx="12" fill="#1e1e2e" stroke="#818cf8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="590" y="114" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="600">🌐 Web UI</text>
  </g>

  <!-- Platform label -->
  <rect x="700" y="88" width="200" height="44" rx="12" fill="#818cf810" stroke="#818cf830" stroke-width="1"/>
  <text x="800" y="107" text-anchor="middle" fill="#818cf8" font-size="10" font-weight="600">多平台接入层</text>
  <text x="800" y="122" text-anchor="middle" fill="#64748b" font-size="9">Webhook / Polling / SSE / WebSocket</text>

  <!-- Flow lines: platforms → backend -->
  <line x1="110" y1="132" x2="320" y2="178" stroke="#818cf860" stroke-width="1" class="flow-line"/>
  <line x1="230" y1="132" x2="370" y2="178" stroke="#818cf860" stroke-width="1" class="flow-line"/>
  <line x1="350" y1="132" x2="420" y2="178" stroke="#818cf860" stroke-width="1" class="flow-line"/>
  <line x1="470" y1="132" x2="470" y2="178" stroke="#818cf860" stroke-width="1" class="flow-line"/>
  <line x1="590" y1="132" x2="520" y2="178" stroke="#818cf860" stroke-width="1" class="flow-line"/>

  <!-- ═══════ Layer 2: FastAPI Backend ═══════ -->
  <rect x="240" y="168" width="480" height="56" rx="14" fill="#1e1e2e" stroke="url(#accent)" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="193" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">⚡ FastAPI 后端</text>
  <text x="480" y="212" text-anchor="middle" fill="#94a3b8" font-size="10">认证 · 路由 · 消息处理 · SSE 流式 · WebSocket 推送 · 管理 API</text>

  <!-- Flow: backend → LangGraph -->
  <line x1="480" y1="224" x2="480" y2="265" stroke="#34d39960" stroke-width="1.5" class="flow-line"/>

  <!-- ═══════ Layer 3: LangGraph Workflow ═══════ -->
  <rect x="160" y="260" width="640" height="170" rx="16" fill="#0d1117" stroke="#34d39950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="286" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">🧠 LangGraph 智能工作流</text>

  <!-- Router node -->
  <g filter="url(#glow)">
    <rect x="400" y="300" width="160" height="40" rx="20" fill="#1a2332" stroke="url(#green)" stroke-width="2"/>
    <text x="480" y="324" text-anchor="middle" fill="#34d399" font-size="12" font-weight="700">🔀 意图路由器</text>
  </g>

  <!-- Worker nodes -->
  <g>
    <rect x="175" y="358" width="105" height="56" rx="10" fill="#1a2332" stroke="#818cf850" stroke-width="1"/>
    <text x="228" y="380" text-anchor="middle" fill="#c7d2fe" font-size="10" font-weight="600">💰 记账</text>
    <text x="228" y="396" text-anchor="middle" fill="#64748b" font-size="8">Finance</text>
  </g>
  <g>
    <rect x="295" y="358" width="105" height="56" rx="10" fill="#1a2332" stroke="#818cf850" stroke-width="1"/>
    <text x="348" y="380" text-anchor="middle" fill="#c7d2fe" font-size="10" font-weight="600">📅 秘书</text>
    <text x="348" y="396" text-anchor="middle" fill="#64748b" font-size="8">Secretary</text>
  </g>
  <g>
    <rect x="415" y="358" width="105" height="56" rx="10" fill="#1a2332" stroke="#818cf850" stroke-width="1"/>
    <text x="468" y="380" text-anchor="middle" fill="#c7d2fe" font-size="10" font-weight="600">✍️ 写作</text>
    <text x="468" y="396" text-anchor="middle" fill="#64748b" font-size="8">Writer + MCP</text>
  </g>
  <g>
    <rect x="535" y="358" width="105" height="56" rx="10" fill="#1a2332" stroke="#818cf850" stroke-width="1"/>
    <text x="588" y="380" text-anchor="middle" fill="#c7d2fe" font-size="10" font-weight="600">🎯 技能</text>
    <text x="588" y="396" text-anchor="middle" fill="#64748b" font-size="8">Skill Mgr</text>
  </g>
  <g>
    <rect x="655" y="358" width="105" height="56" rx="10" fill="#1a2332" stroke="#818cf850" stroke-width="1"/>
    <text x="708" y="380" text-anchor="middle" fill="#c7d2fe" font-size="10" font-weight="600">📖 引导</text>
    <text x="708" y="396" text-anchor="middle" fill="#64748b" font-size="8">Guide</text>
  </g>

  <!-- Router → Workers lines -->
  <line x1="430" y1="340" x2="228" y2="358" stroke="#34d39940" stroke-width="1" class="flow-line"/>
  <line x1="450" y1="340" x2="348" y2="358" stroke="#34d39940" stroke-width="1" class="flow-line"/>
  <line x1="480" y1="340" x2="468" y2="358" stroke="#34d39940" stroke-width="1" class="flow-line"/>
  <line x1="510" y1="340" x2="588" y2="358" stroke="#34d39940" stroke-width="1" class="flow-line"/>
  <line x1="530" y1="340" x2="708" y2="358" stroke="#34d39940" stroke-width="1" class="flow-line"/>

  <!-- ═══════ Layer 4: Data & Services ═══════ -->
  <line x1="300" y1="430" x2="200" y2="478" stroke="#fb923c40" stroke-width="1" class="flow-line"/>
  <line x1="480" y1="430" x2="420" y2="478" stroke="#fb923c40" stroke-width="1" class="flow-line"/>
  <line x1="600" y1="430" x2="640" y2="478" stroke="#22d3ee40" stroke-width="1" class="flow-line"/>

  <g>
    <rect x="80" y="472" width="180" height="52" rx="12" fill="#1e1e2e" stroke="url(#orange)" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="170" y="496" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="700">🐘 PostgreSQL</text>
    <text x="170" y="512" text-anchor="middle" fill="#64748b" font-size="9">用户 · 账单 · 日程 · 技能</text>
  </g>
  <g>
    <rect x="290" y="472" width="180" height="52" rx="12" fill="#1e1e2e" stroke="url(#orange)" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="380" y="496" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="700">🔴 Redis Stack</text>
    <text x="380" y="512" text-anchor="middle" fill="#64748b" font-size="9">Checkpointer · 去重 · 待确认账单</text>
  </g>
  <g>
    <rect x="500" y="472" width="180" height="52" rx="12" fill="#1e1e2e" stroke="url(#cyan)" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="590" y="496" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700">🤖 LLM (OpenAI)</text>
    <text x="590" y="512" text-anchor="middle" fill="#64748b" font-size="9">GPT-4o · Vision · 意图路由</text>
  </g>
  <g>
    <rect x="710" y="472" width="180" height="52" rx="12" fill="#1e1e2e" stroke="url(#pink)" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="800" y="496" text-anchor="middle" fill="#f472b6" font-size="12" font-weight="700">⏰ APScheduler</text>
    <text x="800" y="512" text-anchor="middle" fill="#64748b" font-size="9">定时提醒 · 日程触发</text>
  </g>

  <!-- MCP Fetch -->
  <line x1="590" y1="524" x2="590" y2="556" stroke="#22d3ee40" stroke-width="1" class="flow-line"/>
  <rect x="500" y="550" width="180" height="42" rx="12" fill="#1e1e2e" stroke="#22d3ee50" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="590" y="570" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="600">🔌 MCP Fetch (Streamable HTTP)</text>
  <text x="590" y="584" text-anchor="middle" fill="#64748b" font-size="8">网页抓取 · 天气查询 · 工具协议</text>

  <!-- ═══════ Layer 5: Frontend ═══════ -->
  <rect x="80" y="608" width="800" height="56" rx="14" fill="#1e1e2e" stroke="url(#accent)" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="633" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">🎨 React + Vite + TypeScript + Tailwind CSS</text>
  <text x="480" y="652" text-anchor="middle" fill="#94a3b8" font-size="10">深色/浅色主题 · 响应式布局 · SSE 流式对话 · WebSocket 通知 · 日历 · 技能工作台</text>

  <!-- Line from data to frontend -->
  <line x1="480" y1="524" x2="480" y2="608" stroke="#818cf850" stroke-width="1" class="flow-line"/>

  <!-- ═══════ Bottom: Docker ═══════ -->
  <rect x="280" y="680" width="400" height="32" rx="8" fill="#818cf810" stroke="#818cf830" stroke-width="1"/>
  <text x="480" y="701" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="600">🐳 Docker Compose 一键部署</text>

  <!-- Pulse dots -->
  <circle cx="480" cy="320" r="3" fill="#34d399" class="pulse-node"/>
  <circle cx="480" cy="196" r="2.5" fill="#818cf8" class="pulse-node" style="animation-delay: 1s"/>
</svg>
