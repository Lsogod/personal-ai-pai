<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PAI favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="bubble" x1="8" y1="12" x2="46" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e4e4e7"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- 白色主气泡 -->
  <rect x="8" y="14" width="36" height="26" rx="8" fill="url(#bubble)"/>
  <path d="M13 40 L8 48 L22 40" fill="url(#bubble)"/>

  <!-- 打字圆点 -->
  <circle cx="18" cy="27" r="2.8" fill="#27272a"/>
  <circle cx="26" cy="27" r="2.8" fill="#52525b" opacity="0.7"/>
  <circle cx="34" cy="27" r="2.8" fill="#71717a" opacity="0.45"/>

  <!-- 浅蓝 AI 节点 -->
  <circle cx="49" cy="19" r="5.5" fill="url(#dot)"/>

  <!-- 光环 -->
  <circle cx="49" cy="19" r="9.5" fill="none" stroke="#7dd3fc" stroke-width="1.2" opacity="0.25"/>
</svg>
